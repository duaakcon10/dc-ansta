name: Build & Release Bot

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev zlib1g-dev
      - name: Build static
        run: |
          make -C src static
          mv src/bot_static ./bot_static
      - name: Build dynamic
        run: |
          make -C src dynamic
          mv src/bot ./bot
      - name: Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bot,bot_static
          body: "Ultimate Bot v4 — ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
